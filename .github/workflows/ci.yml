name: Nuxt Continuous Integration

on:
  push:
    branches: 
      - master

env:
  Node_Version: 22.x
  Image_Name: admin-web
  Tag: latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.Node_Version }}

    - name: Install dependencies
      run: npm i -g pnpm && pnpm i
    
    # - name: Lint & Format
    #   run: pnpm run check

    - name: Build
      run: pnpm run build

    # - name: Test
    #   run: pnpm run test

    - name: Build Docker Image
      run: |
        docker build -t ${{ env.Image_Name }}:${{ env.Tag }} . 

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: RichillCapital.Admin.Web
        path: ./.output